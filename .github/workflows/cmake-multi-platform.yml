name: CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: cm7
            target_dir: targets/nxp/vmu_rt1170/cm7
            build_dir: build/nxp/vmu_rt1170/cm7
          - target: cm4
            target_dir: targets/nxp/vmu_rt1170/cm4
            build_dir: build/nxp/vmu_rt1170/cm4

    name: build ${{ matrix.target }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Init build submodules
      run: |
        git submodule update --init --depth=1 \
          middlewares/zephyr \
          hardware/hal_nxp \
          hardware/cmsis \
          hardware/cmsis_6 \
          hardware/fatfs \
          src/modules/mavlink/mavlink \
          src/lib/heatshrink/heatshrink

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build device-tree-compiler \
          gcc g++ curl tar xz-utils

    - name: Cache Zephyr SDK
      uses: actions/cache@v4
      id: sdk-cache
      with:
        path: toolchain
        key: zephyr-sdk-1.0.0-arm

    - name: Install Zephyr SDK (arm-zephyr-eabi)
      if: steps.sdk-cache.outputs.cache-hit != 'true'
      run: bash tools/setup_env.sh

    - name: Cache Python venv
      uses: actions/cache@v4
      id: venv-cache
      with:
        path: .venv
        key: venv-py313-empy3.3.4-${{ hashFiles('middlewares/zephyr/scripts/requirements.txt') }}

    - name: Setup Python venv
      if: steps.venv-cache.outputs.cache-hit != 'true'
      run: |
        python3 -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install empy==3.3.4 pyros-genmsg
        .venv/bin/pip install -r middlewares/zephyr/scripts/requirements.txt

    - name: Build ${{ matrix.target }}
      run: make ${{ matrix.target }}

    - name: Build report
      run: |
        echo "=== Output files ==="
        find ${{ matrix.build_dir }}/zephyr -maxdepth 1 \
          -name "zephyr.elf" -o -name "zephyr.bin" -o -name "zephyr.hex" \
          | xargs ls -lh 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rtframe-${{ matrix.target }}
        path: |
          ${{ matrix.build_dir }}/zephyr/zephyr.elf
          ${{ matrix.build_dir }}/zephyr/zephyr.bin
          ${{ matrix.build_dir }}/zephyr/zephyr.hex
