# Phase 1: minimal PC build — verify infrastructure
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_NEWLIB_LIBC=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

# RTFrame master switches — core + lib only for Phase 1
CONFIG_RTFRAME_CORE=y
CONFIG_RTFRAME_LIB=y

# Disable libs that depend on uORB (uORB disabled on native_sim)
CONFIG_RTFRAME_ADSB=n
CONFIG_RTFRAME_TIMESYNC=n
CONFIG_RTFRAME_DATAMAN_CLIENT=n
CONFIG_RTFRAME_MAVLINK_LOG=n
