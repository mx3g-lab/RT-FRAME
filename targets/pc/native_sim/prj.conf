# PC native_sim full build
# pthread via pthread_compat.h (k_mutex/k_thread), not POSIX_API
# POSIX_API incompatible with native_sim EXTERNAL_LIBC (glibc)
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y

# RTFrame master switches
CONFIG_HEAP_MEM_POOL_SIZE=131072

CONFIG_RTFRAME_CORE=y
CONFIG_RTFRAME_LIB=y
CONFIG_RTFRAME_MODULES=y
CONFIG_RTFRAME_MIDDLEWARE=y

# Disable logger — needs SD card, triggers DEFINE_PARAMETERS issues
CONFIG_RTFRAME_LOGGER=n

# Middleware
CONFIG_RTFRAME_UORB=y

# MAVLink
CONFIG_RTFRAME_MAVLINK=y
CONFIG_RTFRAME_MAVLINK_LOG=y

# Parameter system
CONFIG_RTFRAME_PARAM=y

# Disable dataman_client (needs PX4 poll types)
CONFIG_RTFRAME_DATAMAN_CLIENT=n

# Libraries needed by params
CONFIG_RTFRAME_TINYBSON=y

# File system
CONFIG_FILE_SYSTEM=y
