CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_NEWLIB_LIBC=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
#
# logging
#
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=16384
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1024
CONFIG_UART_ASYNC_API=y
#
# RTFrame master switches - CM7 full config
#
CONFIG_RTFRAME_CORE=y
CONFIG_RTFRAME_LIB=y
CONFIG_RTFRAME_DRIVERS=y
CONFIG_RTFRAME_MODULES=y
CONFIG_RTFRAME_MIDDLEWARE=y
CONFIG_RTFRAME_MAVLINK_LOG=y
CONFIG_RTFRAME_SD_BENCH=y
CONFIG_RTFRAME_PARAM_LOADER=y
CONFIG_RTFRAME_TINYBSON=y
CONFIG_RTFRAME_TEST_SDCARD=y
CONFIG_RTFRAME_ZBUS=y
CONFIG_RTFRAME_UORB=y
#
# rtframe
#
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000
# end of rtframe
#
# shell
#
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_STACK_SIZE=4096
#
# SD card + 文件系统
#
CONFIG_DISK_ACCESS=y
CONFIG_SDHC=y
CONFIG_IMX_USDHC=y
CONFIG_SDMMC_SUBSYS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_MOUNT_MKFS=n
CONFIG_FS_FATFS_LFN=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_SHELL_MOUNT_COMMAND=y
CONFIG_ZVFS_OPEN_MAX=50
CONFIG_FS_LOG_LEVEL_OFF=y
CONFIG_FS_FATFS_NUM_FILES=20
CONFIG_FS_FATFS_NUM_DIRS=8
CONFIG_FS_FATFS_REENTRANT=y
#
# USB CDC-ACM 虚拟串口
#
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
CONFIG_UART_LINE_CTRL=y
CONFIG_UDC_BUF_COUNT=32
CONFIG_UDC_BUF_POOL_SIZE=4096
CONFIG_UDC_WORKQUEUE_STACK_SIZE=2048
CONFIG_USBD_CDC_ACM_BUF_POOL_SIZE=4096
CONFIG_RTFRAME_USB_CDC=y

# Parameter system
CONFIG_POSIX_API=y
CONFIG_POSIX_FSYNC=y
CONFIG_RTFRAME_PARAM=y
CONFIG_RTFRAME_LOGGER=y
CONFIG_RTFRAME_TESTS=y

# Test modules
CONFIG_RTFRAME_TEST_SDCARD=y
CONFIG_RTFRAME_TEST_PERF=y
CONFIG_RTFRAME_TEST_RINGBUFFER=y
CONFIG_RTFRAME_TEST_PARAM=y
CONFIG_RTFRAME_DEMO_PUB=y
CONFIG_RTFRAME_DEMO_SUB=y

# ──────────────────────────────────────────────────────────────────────────
# 新增 PX4 移植库
# ──────────────────────────────────────────────────────────────────────────
CONFIG_RTFRAME_CIRCUIT_BREAKER=y
CONFIG_RTFRAME_ATMOSPHERE=y
CONFIG_RTFRAME_AIRSPEED=y
CONFIG_RTFRAME_GEO=y
CONFIG_RTFRAME_CONVERSION=y
CONFIG_RTFRAME_TIMESYNC=y
CONFIG_RTFRAME_DATAMAN_CLIENT=n
CONFIG_RTFRAME_ADSB=y
CONFIG_RTFRAME_TUNES=y
CONFIG_RTFRAME_VERSION=y
CONFIG_RTFRAME_MATHLIB=y
CONFIG_RTFRAME_MATRIX=y
